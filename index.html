<style>
:root{
  --bg:#F4F5F7; --surface:#FFFFFF; --surface-2:#FAFBFC;
  --ink:#161B26; --muted:#616B7A; --faint:#8B95A4;
  --line:#E4E7EC; --line-2:#EEF0F3;
  --brand:#2C5CC5; --brand-ink:#1E3F8F; --brand-soft:#EAF0FC;
  --green:#1E9E6A; --green-soft:#E5F4EC;
  --amber:#C57D08; --amber-soft:#FBF0DA;
  --red:#D1453B; --red-soft:#FBE9E7;
  --violet:#6B4FBB; --violet-soft:#EFEBF8;
  --radius:10px; --radius-sm:7px;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.08);
  --shadow-lg:0 10px 32px rgba(16,24,40,.16);
  --font-d:"Space Grotesk",system-ui,sans-serif;
  --font-b:"Inter",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-b);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--brand);text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3,h4{font-family:var(--font-d);margin:0;letter-spacing:-.01em}

/* layout */
.app{display:flex;min-height:100vh}
.sidebar{width:236px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:18px 18px 16px}
.brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),#5B7BE0);display:grid;place-items:center;color:#fff;font-family:var(--font-d);font-weight:700;font-size:15px}
.brand .name{font-family:var(--font-d);font-weight:700;font-size:16px;letter-spacing:-.02em}
.brand .name span{color:var(--brand)}
.nav{padding:6px 10px;flex:1;overflow-y:auto}
.nav-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;color:var(--muted);font-weight:500;border:none;background:none;width:100%;text-align:left;font-size:14px;margin-bottom:1px}
.nav-item:hover{background:var(--surface-2);color:var(--ink)}
.nav-item.active{background:var(--brand-soft);color:var(--brand-ink);font-weight:600}
.nav-item .ico{width:18px;height:18px;flex-shrink:0;opacity:.85}
.nav-item .badge{margin-left:auto;font-size:11px;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-weight:600}
.nav-item.active .ico{opacity:1}
.who{border-top:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--violet-soft);color:var(--violet);display:grid;place-items:center;font-weight:600;font-size:13px;flex-shrink:0}
.who .meta{min-width:0}
.who .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.who .rl{font-size:11px;color:var(--faint)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;border-bottom:1px solid var(--line);background:var(--surface);display:flex;align-items:center;gap:14px;padding:0 24px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:19px;font-weight:600}
.topbar .sub{color:var(--faint);font-size:13px;margin-left:2px}
.spacer{flex:1}
.mode-pill{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:6px}
.mode-pill .dot{width:7px;height:7px;border-radius:50%}
.mode-local{background:var(--amber-soft);color:var(--amber)}
.mode-local .dot{background:var(--amber)}
.mode-team{background:var(--green-soft);color:var(--green)}
.mode-team .dot{background:var(--green)}
.content{padding:24px;max-width:1180px;width:100%;margin:0 auto}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-weight:600;font-size:13.5px}
.btn:hover{background:var(--surface-2)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-ink)}
.btn.sm{padding:5px 10px;font-size:12.5px;border-radius:7px}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{background:var(--surface-2);color:var(--ink)}
.btn.danger{color:var(--red);border-color:var(--red-soft)}
.btn.danger:hover{background:var(--red-soft)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* cards & sections */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.section-head{display:flex;align-items:center;gap:12px;margin:0 0 14px}
.section-head h2{font-size:16px;font-weight:600}
.section-head .count{font-size:12px;color:var(--faint);font-weight:500}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.stat .lab{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:7px}
.stat .num{font-family:var(--font-d);font-size:26px;font-weight:700;margin-top:6px;letter-spacing:-.02em}
.stat .lab .ic{width:8px;height:8px;border-radius:50%}
.stat.clickable{cursor:pointer;transition:border-color .12s,box-shadow .12s,transform .06s}
.stat.clickable:hover{border-color:var(--brand);box-shadow:0 3px 12px rgba(44,92,197,.12)}
.stat.clickable:active{transform:translateY(1px)}
.home-tools{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.seg-group{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.seg{appearance:none;border:none;background:none;font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);padding:6px 13px;border-radius:7px;cursor:pointer}
.seg:hover{color:var(--ink)}
.seg.active{background:var(--surface);color:var(--brand);box-shadow:var(--shadow)}
.bucket-chip{display:inline-flex;align-items:center;gap:6px;background:var(--brand-soft);color:var(--brand-ink);border:1px solid #D3E0F8;border-radius:8px;padding:4px 6px 4px 11px;font-size:12.5px;font-weight:600}
.bucket-chip button{border:none;background:none;color:var(--brand);cursor:pointer;font-size:15px;line-height:1;padding:0 2px}

/* task card */
.task{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);transition:border-color .12s}
.task:hover{border-color:#D2D7DE}
.task.overdue{border-left:3px solid var(--red)}
.task-top{display:flex;align-items:flex-start;gap:12px}
.task-title{font-weight:600;font-size:14.5px;line-height:1.35}
.task-title.completed{text-decoration:line-through;color:var(--faint)}
.task-meta{display:flex;flex-wrap:wrap;gap:7px 14px;margin-top:8px;font-size:12.5px;color:var(--muted);align-items:center}
.task-meta .m{display:flex;align-items:center;gap:5px}
.task-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.prio-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.prio-High{background:var(--red)} .prio-Medium{background:var(--amber)} .prio-Low{background:var(--green)}
.handler-badge{align-self:flex-start;flex-shrink:0;display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--brand-ink);background:var(--brand-soft);border:1px solid #D3E0F8;border-radius:20px;padding:3px 10px;white-space:nowrap}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.chip .d{width:6px;height:6px;border-radius:50%}
.chip-client{background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}
.st-todo{background:#EEF0F3;color:#5B6472}
.st-in_progress{background:var(--brand-soft);color:var(--brand-ink)}
.st-done{background:var(--green-soft);color:var(--green)}
.st-sent{background:var(--amber-soft);color:var(--amber)}
.co-implemented{background:var(--green-soft);color:var(--green)}
.co-not_implemented{background:var(--red-soft);color:var(--red)}
.co-pending{background:var(--violet-soft);color:var(--violet)}

/* pipeline */
.pipeline{display:flex;align-items:center;gap:0;margin-top:11px;flex-wrap:wrap}
.pstep{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--faint)}
.pstep .pc{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-size:10px;color:#fff;background:var(--surface)}
.pstep.on{color:var(--ink)}
.pstep.on .pc{border-color:var(--green);background:var(--green)}
.parrow{width:18px;height:2px;background:var(--line);margin:0 7px}
.parrow.on{background:var(--green)}

/* table-ish list controls */
.filters{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:var(--muted)}
input[type=text],input[type=date],input[type=url],input[type=search],input[type=number],input[type=file],select,textarea{
  padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);width:100%}
input[type=file]{padding:7px 9px;font-size:13px;color:var(--muted)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.search{min-width:220px}
select.compact,input.compact{padding:7px 10px;font-size:13px;width:auto}

/* empty */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .big{font-family:var(--font-d);font-size:17px;font-weight:600;color:var(--ink);margin-bottom:6px}
.empty .ic{font-size:30px;margin-bottom:10px;opacity:.6}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(16,24,40,.45);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;animation:pop .14s ease}
.modal.wide{max-width:920px}
@keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:17px;font-weight:600}
.modal-head .x{margin-left:auto;border:none;background:none;font-size:22px;color:var(--faint);line-height:1;width:30px;height:30px;border-radius:7px}
.modal-head .x:hover{background:var(--surface-2);color:var(--ink)}
.modal-body{padding:20px 22px;max-height:70vh;overflow-y:auto}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.form-grid label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}

/* client detail */
.client-hd{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.client-hd .ava{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;font-family:var(--font-d);font-weight:700;font-size:18px;color:#fff}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:18px 0 18px}
.tab{padding:9px 14px;border:none;background:none;font-weight:600;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--brand-ink);border-bottom-color:var(--brand)}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.client-card{cursor:pointer;padding:16px;display:flex;gap:12px;align-items:center}
.client-card:hover{border-color:#D2D7DE}
.client-card .info{min-width:0}
.client-card .cn{font-weight:600;font-size:15px}
.client-card .cs{font-size:12.5px;color:var(--faint);margin-top:2px}

/* search console dashboard */
.gsc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.gsc-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px 10px}
.gsc-card:hover{border-color:#D2D7DE}
.gsc-top{display:flex;align-items:flex-start;gap:9px;margin-bottom:6px}
.gsc-fav{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:#fff;font-family:var(--font-d);font-weight:700;font-size:12px;flex-shrink:0}
.gsc-dom{font-weight:600;font-size:14px;color:var(--ink)}
.gsc-metrics{margin-left:auto;text-align:right;line-height:1.2;display:flex;flex-direction:column;gap:3px}
.gsc-metric-row{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.gsc-mico{width:13px;height:13px;flex-shrink:0}
.gsc-clk{color:var(--brand)} .gsc-imp{color:var(--violet)}
.gsc-num{font-family:var(--font-d);font-weight:700;font-size:14px}
.gsc-chg{font-size:11px;font-weight:700}
.gsc-up{color:var(--green)} .gsc-down{color:var(--red)} .gsc-flat{color:var(--faint)}
.gsc-spark{width:100%;height:72px;display:block;cursor:crosshair}
.gsc-foot{display:flex;gap:14px;margin-top:8px;font-size:11.5px;color:var(--faint);font-weight:500}
.gsc-foot .gf{display:flex;align-items:center;gap:5px}
.gsc-controls{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.gsc-toggle{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:6px 10px;font-size:12.5px;font-weight:600;color:var(--muted)}
.gsc-toggle.on{background:var(--violet-soft);border-color:#D6CCF0;color:var(--violet)}
.gsc-toggle .sw{width:13px;height:13px}
.gsc-guide{stroke:var(--faint);stroke-width:1;stroke-dasharray:3 3;opacity:0;pointer-events:none}
.gsc-dot{opacity:0;pointer-events:none}
.gsc-tip{position:fixed;z-index:120;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-lg);border-radius:9px;padding:9px 11px;font-size:12px;pointer-events:none;display:none;min-width:150px}
.gsc-tip .tt-row{display:flex;justify-content:space-between;gap:14px;padding:1px 0}
.gsc-tip .tt-k{color:var(--muted)} .gsc-tip .tt-date{font-weight:600;font-size:11px;color:var(--faint);margin-bottom:4px}

/* SEO audit */
.audit-bar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.ai-btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--violet),#8B6FD0);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:600;font-size:13.5px}
.ai-btn:hover{filter:brightness(1.06)}
.gsc-an{margin-left:auto;border:none;background:none;color:var(--violet);font-weight:700;font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.gsc-an:hover{text-decoration:underline}
.metric-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mtile{border:1px solid var(--line);border-radius:10px;padding:11px 14px;cursor:pointer;background:var(--surface);box-shadow:var(--shadow);border-top:3px solid transparent;transition:opacity .12s}
.mtile .ml{font-size:11.5px;color:var(--muted);font-weight:600}
.mtile .mv{font-family:var(--font-d);font-size:21px;font-weight:700;margin-top:3px;line-height:1}
.mtile.off{opacity:.5}
.mtile.m-clicks.on{border-top-color:var(--brand)}.mtile.m-impr.on{border-top-color:var(--violet)}.mtile.m-ctr.on{border-top-color:var(--green)}.mtile.m-pos.on{border-top-color:var(--amber)}
.dchart{width:100%;height:240px;display:block;cursor:crosshair}
.dchart .dgd{stroke:var(--faint);stroke-width:1;stroke-dasharray:3 3;opacity:0}
.dlegend{display:flex;gap:16px;flex-wrap:wrap;margin:8px 2px 0;font-size:12px;color:var(--muted)}
.dlegend .dl{display:flex;align-items:center;gap:6px}.dlegend .sw{width:12px;height:3px;border-radius:2px;display:inline-block}
.dtabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:18px 0 0}
.dtab{padding:9px 14px;border:none;background:none;font-weight:600;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.dtab.active{color:var(--brand-ink);border-bottom-color:var(--brand)}
.dtable-wrap{max-height:380px;overflow:auto;border:1px solid var(--line);border-top:none;border-radius:0 0 10px 10px}
.dtable{width:100%;border-collapse:collapse;font-size:13px}
.dtable th{position:sticky;top:0;background:var(--surface-2);text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;padding:9px 14px;border-bottom:1px solid var(--line);z-index:1}
.dtable th.num,.dtable td.num{text-align:right;font-variant-numeric:tabular-nums}
.dtable td{padding:9px 14px;border-bottom:1px solid var(--line-2)}
.dtable tr:last-child td{border-bottom:none}
/* QBR */
.qbr-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.qbr-bar-lbl{font-size:12.5px;color:var(--muted);font-weight:600;margin-left:6px}
.qbr-bar-lbl:first-child{margin-left:0}
.qbr-period-badge{font-family:var(--font-d);font-weight:700;font-size:13px;color:var(--brand-ink);background:var(--brand-soft);border-radius:20px;padding:4px 12px}
.qbr-gen{padding:18px 20px;margin-bottom:18px}
.qbr-gen-h{font-size:15px;font-weight:700}
.qbr-gen-p{font-size:12.5px;color:var(--muted);line-height:1.55;margin:5px 0 14px}
.qbr-gen-grid{display:grid;grid-template-columns:230px 1fr;gap:12px}
@media(max-width:680px){.qbr-gen-grid{grid-template-columns:1fr}}
.filebox{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;border:1.5px dashed var(--line);border-radius:11px;padding:18px 14px;cursor:pointer;background:var(--surface-2);color:var(--muted);font-size:12.5px;transition:border-color .15s,background .15s}
.filebox:hover{border-color:var(--brand);background:var(--brand-soft)}
.filebox-ic{font-size:24px}
.filebox-sub{color:var(--faint);font-size:11px}
.qbr-gen-status{font-size:12px;color:var(--muted);min-height:16px;margin:10px 2px 0}
.qbr-gen-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.qbr-empty-note{color:var(--faint);font-size:13px;padding:10px 2px}
.import-box{border:1px solid var(--line);background:var(--surface-2);border-radius:12px;padding:14px 16px;margin-bottom:6px}
.import-h{font-size:13.5px;font-weight:700}
.import-p{font-size:12px;color:var(--muted);line-height:1.5;margin:4px 0 10px}
.import-or{text-align:center;font-size:11.5px;color:var(--faint);margin-top:12px}
.loading-block{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:54px 20px;color:var(--muted);font-size:13.5px}
.spinner{width:30px;height:30px;border:3px solid var(--line-2);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.qbr-dash{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
@media(max-width:680px){.qbr-dash{grid-template-columns:1fr}}
.dash-item{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:var(--surface);box-shadow:var(--shadow)}
.dash-top{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;color:var(--muted);font-weight:600}
.dash-top b{font-family:var(--font-d);font-size:19px;color:var(--ink)}
.dash-track{height:8px;border-radius:6px;background:var(--line-2);overflow:hidden;margin:8px 0 5px}
.dash-fill{height:100%;border-radius:6px;transition:width .4s ease}
.dash-sub{font-size:11.5px;color:var(--faint)}
.qbr-section-title{font-size:14.5px;font-weight:700;margin:22px 0 8px;color:var(--ink)}
.qbr-prio-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 6px;display:flex;align-items:center;gap:8px}
.qbr-prio-label.prio-High{color:var(--red)}.qbr-prio-label.prio-Medium{color:var(--amber)}.qbr-prio-label.prio-Low{color:var(--muted)}
.qbr-prio-label .count{background:var(--line-2);color:var(--muted);border-radius:20px;padding:1px 8px;font-size:11px}
.qbr-card{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:var(--surface);box-shadow:var(--shadow);margin-bottom:8px}
.qbr-title{font-weight:600;font-size:14.5px}
.qbr-qty{font-size:11.5px;font-weight:700;color:var(--brand-ink);background:var(--brand-soft);border-radius:20px;padding:1px 9px;margin-left:6px;vertical-align:middle}
.qbr-sub{font-size:12px;color:var(--faint);margin-top:2px}
.qbr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qbr-prog{font-size:12px;font-weight:600;color:var(--muted)}
.qbr-empty{color:var(--faint);font-size:13px;padding:6px 2px}
.icon-btn{border:none;background:none;color:var(--faint);cursor:pointer;font-size:14px;padding:4px;border-radius:6px}
.icon-btn:hover{background:var(--line-2);color:var(--red)}
.modal-note{font-size:12.5px;color:var(--muted);margin:2px 0 12px;line-height:1.5}
/* column chart */
.chart-scroll{overflow-x:auto;padding-bottom:6px}
.qbr-chart{display:block;max-width:100%;height:auto}
.audit-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.audit-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px 15px;display:flex;gap:12px;align-items:center}
.audit-card .lab{font-size:11.5px;color:var(--muted);font-weight:600}
.audit-card .val{font-family:var(--font-d);font-size:22px;font-weight:700;margin-top:2px;line-height:1}
.audit-card .chg{font-size:11px;font-weight:700;margin-top:3px}
.dr-badge{display:inline-grid;place-items:center;width:48px;height:48px;border-radius:11px;color:#fff;font-family:var(--font-d);font-weight:700;font-size:19px;flex-shrink:0}
.audit-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.audit-grid2{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.panel-h{padding:12px 16px;border-bottom:1px solid var(--line);font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.panel-h .ct{margin-left:auto;font-size:12px;color:var(--faint);font-weight:500}
.atable{width:100%;border-collapse:collapse;font-size:13px}
.atable th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;padding:8px 14px;border-bottom:1px solid var(--line)}
.atable td{padding:9px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.atable tr:last-child td{border-bottom:none}
.atable .num{font-variant-numeric:tabular-nums}
.dofollow{font-size:10px;font-weight:700;color:var(--green);background:var(--green-soft);padding:1px 6px;border-radius:5px}
.nofollow{font-size:10px;font-weight:700;color:var(--muted);background:var(--surface-2);padding:1px 6px;border-radius:5px;border:1px solid var(--line)}
.pos-up{color:var(--green);font-weight:700}.pos-down{color:var(--red);font-weight:700}.pos-flat{color:var(--faint)}
.dr-mini{display:inline-grid;place-items:center;min-width:26px;height:20px;border-radius:5px;color:#fff;font-size:11px;font-weight:700;padding:0 5px}
/* --- Ahrefs-style audit dashboard --- */
.aud-overview{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:1000px){.aud-overview{grid-template-columns:1fr}}
.aud-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px}
.aud-ph{font-family:var(--font-d);font-weight:700;font-size:14px;margin-bottom:14px}
.aud-duo{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.aud-duo-b{margin-top:14px;padding-top:14px;border-top:1px solid var(--line-2)}

.aud-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:14px;flex-wrap:wrap}

.aud-tablewrap{width:100%;overflow-x:auto}
.ai-slide{background:linear-gradient(135deg,#F6F3FC,#FFFFFF);border:1px solid #E4DBF5;border-radius:12px;padding:22px 24px}

.slide{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);aspect-ratio:16/9;padding:38px 44px;margin-bottom:20px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.slide .kicker{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--brand)}
.slide h2.s-title{font-size:30px;font-weight:700;margin:8px 0 0;line-height:1.1}

.slide .ssbadge{font-size:11px;font-weight:700;color:var(--amber);border:1px dashed var(--amber);padding:2px 7px;border-radius:6px;white-space:nowrap;margin-top:1px}
.slide .s-foot{margin-top:auto;padding-top:14px;font-size:11.5px;color:var(--faint);display:flex;justify-content:space-between}

.helpbox{background:var(--brand-soft);border:1px solid #D3E0F8;border-radius:10px;padding:14px 16px;font-size:13px;color:var(--brand-ink);margin-bottom:16px}

<!-- Supabase client (only used if you configure team mode in CONFIG below) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* =========================================================================
   SEO DESK — configuration
   -------------------------------------------------------------------------
   LOCAL MODE (default): data is saved in this browser only. Great for trying
   it out solo. Nothing to set up.

   TEAM MODE (shared across you + your team): create a free Supabase project,
   run the SQL in the setup guide, then paste your URL + anon key below.
   ========================================================================= */
const CONFIG = {
  SUPABASE_URL: "https://fiubdomqrkgtwicwhdbo.supabase.co",      // e.g. "https://abcd1234.supabase.co"
  SUPABASE_ANON_KEY: "sb_publishable_nTADQDDQaNvDnvriV-Pvqg_XBdRqQ9q",  // your project's anon/public key
  // Only let people sign up with these email domains. Leave as [] to allow any email.
  ALLOWED_EMAIL_DOMAINS: ["welcometomorrow.io"],
  // These emails are treated as Super admins (see everything, manage members).
  SUPER_ADMINS: ["cosmas@welcometomorrow.io"]
};

const TEAM = !!(CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY);

/* ---------- small utilities ---------- */
const $ = (s,el=document)=>el.querySelector(s);
const uid = ()=> 't_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc = (s='')=> String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayISO = ()=> new Date().toISOString().slice(0,10);
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function fmtDateLong(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}); }
function daysFromToday(iso){ if(!iso) return 9999; const a=new Date(todayISO()), b=new Date(iso); return Math.round((b-a)/86400000); }
function startOfWeek(d=new Date()){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function endOfRange(range){ const n=new Date(); n.setHours(0,0,0,0);
  if(range==='today'){ const e=new Date(n); e.setDate(e.getDate()+1); return e; }
  if(range==='month'){ return new Date(n.getFullYear(), n.getMonth()+1, 1); }
  if(range==='quarter'){ const q=Math.floor(n.getMonth()/3); return new Date(n.getFullYear(), q*3+3, 1); }
  const e=startOfWeek(); e.setDate(e.getDate()+7); return e; // week (default)
}
const RANGE_LABEL={today:'Today',week:'This week',month:'This month',quarter:'This quarter'};
function colorFor(name){ const c=['#2C5CC5','#1E9E6A','#6B4FBB','#C57D08','#D1453B','#0E8C7F','#B5179E','#3A7D44']; let h=0; for(const ch of (name||'')) h=(h*31+ch.charCodeAt(0))>>>0; return c[h%c.length]; }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

const TASK_TYPES=["Keyword Research","Technical SEO","On-Page SEO","Content","Off-Page / Link Building","Local SEO","Site Audit","Analytics & Reporting","Other"];
const STATUS_FLOW=["todo","in_progress","done","sent"];
const STATUS_LABEL={todo:"To do",in_progress:"In progress",done:"Done (our work)",sent:"Sent to client"};
const CO_LABEL={pending:"Awaiting client",implemented:"Done by client",not_implemented:"Not done by client"};

/* =========================================================================
   STORE — async interface backed by localStorage (local) or Supabase (team)
   ========================================================================= */
const LS_KEY="seodesk_v1";
let sb=null;
const Store=(()=>{
  function loadLocal(){
    try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {clients:[],tasks:[],team:[],settings:{}}; }
    catch(e){ return {clients:[],tasks:[],team:[],settings:{}}; }
  }
  function saveLocal(db){ localStorage.setItem(LS_KEY, JSON.stringify(db)); }

  if(TEAM){ sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY); }

  // In team mode every row is {id, payload(jsonb), created_at} — no column mapping headaches.
  return {
    async clients(){
      if(TEAM){ const {data,error}=await sb.from('clients').select('payload').order('created_at'); if(error)throw error; return (data||[]).map(r=>r.payload); }
      return loadLocal().clients;
    },
    async saveClient(c){
      if(TEAM){ await sb.from('clients').upsert({id:c.id,payload:c}); return c; }
      const db=loadLocal(); const i=db.clients.findIndex(x=>x.id===c.id);
      if(i>=0) db.clients[i]=c; else db.clients.push(c); saveLocal(db); return c;
    },
    async deleteClient(id){
      if(TEAM){ await sb.from('clients').delete().eq('id',id); return; }
      const db=loadLocal(); db.clients=db.clients.filter(c=>c.id!==id); saveLocal(db);
    },
    async tasks(){
      if(TEAM){ const {data,error}=await sb.from('tasks').select('payload').order('created_at',{ascending:false}); if(error)throw error; return (data||[]).map(r=>r.payload); }
      return loadLocal().tasks;
    },
    async saveTask(t){
      if(TEAM){ await sb.from('tasks').upsert({id:t.id,payload:t,created_at:t.created_at||new Date().toISOString()}); return t; }
      const db=loadLocal(); const i=db.tasks.findIndex(x=>x.id===t.id);
      if(i>=0) db.tasks[i]=t; else db.tasks.unshift(t); saveLocal(db); return t;
    },
    async deleteTask(id){
      if(TEAM){ await sb.from('tasks').delete().eq('id',id); return; }
      const db=loadLocal(); db.tasks=db.tasks.filter(t=>t.id!==id); saveLocal(db);
    },
    // QBR targets (per client, per quarter) — {id, clientId, quarter, title, priority, quantity}
    async qbr(){
      if(TEAM){ const {data,error}=await sb.from('qbr').select('payload').order('created_at'); if(error)throw error; return (data||[]).map(r=>r.payload); }
      return loadLocal().qbr || [];
    },
    async saveQbr(q){
      if(TEAM){ await sb.from('qbr').upsert({id:q.id,payload:q,created_at:q.created_at||new Date().toISOString()}); return q; }
      const db=loadLocal(); db.qbr=db.qbr||[]; const i=db.qbr.findIndex(x=>x.id===q.id);
      if(i>=0) db.qbr[i]=q; else db.qbr.push(q); saveLocal(db); return q;
    },
    async deleteQbr(id){
      if(TEAM){ await sb.from('qbr').delete().eq('id',id); return; }
      const db=loadLocal(); db.qbr=(db.qbr||[]).filter(q=>q.id!==id); saveLocal(db);
    },
    // workspace members (team mode only — populated from sign-ups)
    async members(){
      if(TEAM){ const {data,error}=await sb.from('members').select('id,email,name,role').order('name'); if(error)throw error; return data||[]; }
      return [];
    },
    async upsertMember(m){ if(TEAM){ await sb.from('members').upsert(m); } },
    sb(){ return sb; },
    // team list + settings live in localStorage even in team mode (lightweight)
    team(){ return loadLocal().team; },
    saveTeam(arr){ const db=loadLocal(); db.team=arr; saveLocal(db); },
    settings(){ return loadLocal().settings || {}; },
    saveSettings(s){ const db=loadLocal(); db.settings={...db.settings,...s}; saveLocal(db); },
    exportAll(){ return loadLocal(); },
    importAll(obj){ saveLocal(obj); }
  };
})();

/* =========================================================================
   STATE
   ========================================================================= */
const State={ route:'home', clients:[], tasks:[], team:[], settings:{}, clientId:null, user:null, members:[], qbr:[], qbrQuarter:null, gsc:null, gscPeriod:'28d', gscMetric:'clicks', gscCustom:null, gscCompareLen:'28d', gscCompareVs:'previous', gscDetail:null, gscMetrics:{clicks:true,impr:true,ctr:false,pos:false}, gscDimTab:'queries', gscDims:{},
  filters:{client:'',status:'',type:'',q:''}, report:{client:'',period:'this_week',selected:{}} };

/* Who is the current person? In team mode this comes from the signed-in account;
   in local mode it comes from Settings. */
function me(){
  if(TEAM && State.user) return {name:State.user.name, role:State.user.role};
  return {name:State.settings.userName||'You', role:State.settings.userRole||'SEO Specialist'};
}
function assignableNames(){
  if(TEAM) return State.members.map(m=>m.name);
  return State.team;
}
function isSuperAdmin(){
  const r=(me().role||'').toLowerCase();
  if(r==='super admin'||r==='superadmin'||r==='admin') return true;
  const email=(State.user&&State.user.email||'').toLowerCase();
  return (CONFIG.SUPER_ADMINS||[]).map(x=>x.toLowerCase()).includes(email);
}
// Tasks the current user is allowed to see.
// Super admin: everything. Manager: their own + general (unassigned or what others are working on).
function visibleTasks(){
  const all=State.tasks||[];
  if(!TEAM || isSuperAdmin()) return all;
  const n=me().name;
  return all.filter(t=>
    !t.assignedTo || t.assignedTo===n || t.assignedBy===n || t.handler===n ||
    (Array.isArray(t.shareWith)&&t.shareWith.includes(n)) ||
    !!t.assignedBy  // general tasks other managers are working on
  );
}

async function refresh(){
  State.clients = await Store.clients();
  State.tasks = await Store.tasks();
  State.team = Store.team();
  State.settings = Store.settings();
  try{ State.qbr = await Store.qbr(); }catch(e){ State.qbr=[]; }
  if(TEAM){ try{ State.members = await Store.members(); }catch(e){ State.members=[]; } }
}

/* seed first-run defaults */
function ensureDefaults(){
  const s=Store.settings();
  if(!s.userName){
    Store.saveSettings({userName:"You", userRole:"SEO Specialist",
      reportFormat:"Slide 1 — Title (client name, week range)\nSlide 2 — Summary of work done\nSlide 3+ — One section per SEO area (Technical, Content, Off-page...)\nFinal slide — Recommendations & next steps"});
  }
  if(Store.team().length===0){ Store.saveTeam(["You","Manager"]); }
}

/* =========================================================================
   NAV + SHELL
   ========================================================================= */
const NAV=[
  {id:'home',  label:'This Week', icon:'M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z'},
  {id:'tasks', label:'All Tasks', icon:'M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01'},
  {id:'clients',label:'Clients',  icon:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75'},
  {id:'assignments',label:'Assignments',icon:'M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'},
  {id:'dashboard',label:'Search Console',icon:'M3 3v18h18M7 16l3-4 3 2 4-6'},
  {id:'audit',label:'SEO Audit',icon:'M11 3a8 8 0 1 0 0 16 8 8 0 0 0 0-16zM21 21l-4.3-4.3M11 8v4l2 2'},
  {id:'reports',label:'Reports',  icon:'M3 3v18h18M7 16l4-6 3 3 5-7'},
  {id:'settings',label:'Settings',icon:'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z'}
];
function icon(path){ return `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path.split('M').filter(Boolean).map(p=>`<path d="M${p}"/>`).join('')}</svg>`; }

function renderNav(){
  const meName = me().name;
  const assignedToMe = State.tasks.filter(t=> t.assignedBy && t.assignedTo===meName && t.status!=='sent').length;
  $('#nav').innerHTML = NAV.map(n=>{
    const badge = n.id==='assignments' && assignedToMe ? `<span class="badge">${assignedToMe}</span>` : '';

function clientName(id){ return State.clients.find(c=>c.id===id)?.name || 'No client'; }
function statusChip(t){

function pipeline(t){

}
function taskCard(t,opts={}){
  const overdue = t.dueDate && daysFromToday(t.dueDate)<0 && t.status!=='sent';

  if(t.status==='done') actions+=`<button class="btn sm primary" data-act="send" data-id="${t.id}">Send to client</button>`;
  if(t.status==='sent'){
    if((t.clientOutcome||'pending')==='pending'){
      actions+=`<button class="btn sm" data-act="co" data-id="${t.id}" data-co="implemented">Done by client ✓</button>`;
      actions+=`<button class="btn sm danger" data-act="co" data-id="${t.id}" data-co="not_implemented">Not done by client</button>`;
    }else{
      actions+=`<button class="btn sm ghost" data-act="co" data-id="${t.id}" data-co="pending">Reset client status</button>`;
    }
  }
  actions+=`<button class="btn sm ghost" data-act="edit" data-id="${t.id}">Edit</button>`;
  actions+=`<button class="btn sm ghost" data-act="del" data-id="${t.id}">Delete</button>`;
  return `<div class="task ${overdue?'overdue':''}">
    <div class="task-top">
      <span class="prio-dot prio-${t.priority}" title="${t.priority} priority"></span>
      <div style="flex:1;min-width:0">
        <div class="task-title ${t.status==='sent'?'completed':''}">${esc(t.title)}</div>

/* =========================================================================
   VIEW: SEARCH CONSOLE DASHBOARD
   One card per GSC property: trend sparkline + headline metric + % change.
   Shows sample data until /api/gsc is connected (see README → integrations).
   ========================================================================= */
const GSC_PERIOD_OPTS=[
  ['7d','7 days'],['14d','14 days'],['28d','28 days'],
  ['this_month','This month'],['3m','3 months'],['6m','6 months'],
  ['12m','12 months'],['this_quarter','This quarter'],
  ['custom','Custom range'],['compare','Compare periods']
];
function gscPeriodDays(key){
  const now=new Date();
  switch(key){
    case '7d':return 7; case '14d':return 14; case '28d':return 28;
    case '3m':return 91; case '6m':return 182; case '12m':return 365;
    case 'this_month': return now.getDate();
    case 'this_quarter': { const qs=new Date(now.getFullYear(),Math.floor(now.getMonth()/3)*3,1); return Math.round((now-qs)/86400000)+1; }
    default: return 28;
  }
}
function gscWindow(series,n,back){ // n-day window ending `back` days before the latest point
  const len=series.length, end=len-back, start=end-n;
  const slice=series.slice(Math.max(0,start),Math.max(0,end));
  return {slice,total:slice.reduce((a,b)=>a+b,0)};
}
function fmtMetric(n){ if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'')+'k'; return String(Math.round(n)); }
function gscPct(cur,prev){ const b=prev||1; return Math.round(((cur-prev)/b)*100); }
function gscDir(c){ return c>2?'gsc-up':(c<-2?'gsc-down':'gsc-flat'); }
function gscArrow(c){ return c>2?'↑':(c<-2?'↓':'→'); }

// scale values to chart points; share an axis by passing mn/mx
function gscLine(values,w,h,pad,mn,mx){
  const max=(mx!=null?mx:Math.max(...values)), min=(mn!=null?mn:Math.min(...values)), rng=(max-min)||1;
  const stepX=(w-pad*2)/(values.length-1||1);
  const pts=values.map((val,i)=>({x:pad+i*stepX, y:h-pad-((val-min)/rng)*(h-pad*2)}));
  const poly=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=`${pad},${(h-pad).toFixed(1)} ${poly} ${(w-pad).toFixed(1)},${(h-pad).toFixed(1)}`;
  return {pts,poly,area};
}
const GSC_W=300, GSC_H=72, GSC_PAD=5;
State._gscView = State._gscView || {};
function gscChart(domain, clicksCur, clicksPrev, imprCur, showImpr){
  const allc=clicksCur.concat(clicksPrev), mn=Math.min(...allc), mx=Math.max(...allc);
  const cl=gscLine(clicksCur,GSC_W,GSC_H,GSC_PAD,mn,mx);
  const pv=gscLine(clicksPrev,GSC_W,GSC_H,GSC_PAD,mn,mx);   // dashed comparison on same axis as current
  let imLine='', imPts=null;
  if(showImpr){ const im=gscLine(imprCur,GSC_W,GSC_H,GSC_PAD); imPts=im.pts; imLine=`<polyline points="${im.poly}" fill="none" stroke="var(--violet)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>`; }
  State._gscView[domain]={cl:cl.pts, pv:pv.pts, im:imPts};
  return `<svg class="gsc-spark" data-domain="${esc(domain)}" viewBox="0 0 ${GSC_W} ${GSC_H}" preserveAspectRatio="none">
    <polyline points="${cl.area}" fill="var(--brand-soft)" stroke="none"/>
    <polyline points="${pv.poly}" fill="none" stroke="#9DB4E8" stroke-width="1.4" stroke-dasharray="4 3" stroke-linejoin="round"/>
    <polyline points="${cl.poly}" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${imLine}
    <line class="gsc-guide" x1="0" y1="2" x2="0" y2="${GSC_H-2}"/>
    <circle class="gsc-dot gd-cl" r="3.2" fill="var(--brand)"/>
    <circle class="gsc-dot gd-im" r="3" fill="var(--violet)"/>
  </svg>`;
}
function gscTipEl(){ let t=document.getElementById('gscTip'); if(!t){ t=document.createElement('div'); t.id='gscTip'; t.className='gsc-tip'; document.body.appendChild(t); } return t; }
function hideGscTip(){ const t=document.getElementById('gscTip'); if(t) t.style.display='none'; }
function showGscTip(px,py,dom,i){
  const d=State._gscView[dom]; if(!d||!d.curVals) return;
  const cur=d.curVals[i], prev=d.prevVals[i]||0, chg=gscPct(cur,prev);
  const back=d.back||d.curVals.length;
  const dCur=d.dates[i], dPrev=new Date(dCur.getTime()-back*86400000);
  const fmtD=x=>x.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
  const yrSuffix = dPrev.getFullYear()!==dCur.getFullYear() ? ` · ${dPrev.getFullYear()}` : '';
  let html=`<div class="tt-date">${fmtD(dCur)} vs ${fmtD(dPrev)}${yrSuffix}</div>`;
  html+=`<div class="tt-row"><span class="tt-k">Clicks</span><span><b>${fmtMetric(cur)}</b> <span class="${gscDir(chg)}">${gscArrow(chg)}${Math.abs(chg)}%</span></span></div>`;
  html+=`<div class="tt-row"><span class="tt-k">Previous period</span><span>${fmtMetric(prev)}</span></div>`;
  if(d.imVals){ html+=`<div class="tt-row"><span class="tt-k">Impressions</span><span><b>${fmtMetric(d.imVals[i])}</b></span></div>`; }
  const tip=gscTipEl(); tip.innerHTML=html; tip.style.display='block';
  const x=Math.min(window.innerWidth-tip.offsetWidth-12, px+14), y=Math.max(12, py-tip.offsetHeight-12);
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
const GSC_ICO_CLK='<svg class="gsc-mico gsc-clk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M4 20V11M10 20V4M16 20v-7M22 20H2"/></svg>';
const GSC_ICO_IMP='<svg class="gsc-mico gsc-imp" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';

function viewDashboard(v){
  if(!State._gscTried){ State._gscTried=true; loadDashboard().then(()=>{ if(State.route==='dashboard') viewDashboard(v); }); }
  if(State.gsc===null || State.gsc===undefined){ v.innerHTML=`<div class="section-head"><h2>Search Console</h2></div>`+loadingBlock('Loading your Search Console properties…'); return; }
  if(State.gscDetail){ const p=State.gsc.find(x=>x.domain===State.gscDetail); if(p) return renderGscDetail(v,p); State.gscDetail=null; }
  if(!State.gsc.length){ v.innerHTML=`<div class="section-head"><h2>Search Console</h2></div>`+emptyState('🔍','No properties found','This Google account has no Search Console properties, or the connection needs attention. Make sure the account has access to your client properties.'); return; }
  const connected = !!State.settings.gscConnected;
  const period=State.gscPeriod, compare=period==='compare', custom=period==='custom';
  const showImpr=!!State.gscShowImpr;

  let n, cmpBack=365; // default comparison = same period last year (year-over-year)
  if(custom){
    const c=State.gscCustom||{};
    n = (c.from&&c.to) ? Math.max(1, Math.round((new Date(c.to)-new Date(c.from))/86400000)+1) : 28;
    cmpBack = n; // previous equal-length range
  } else if(compare){
    n = gscPeriodDays(State.gscCompareLen||'28d');
    cmpBack = (State.gscCompareVs==='year') ? 365 : n;
  } else {
    n = gscPeriodDays(period);
    cmpBack = n; // auto-compare to the previous period of the same length
  }

  State._gscView={};
  const periodText = compare ? `${(State.gscCompareLen||'28d')} vs ${State.gscCompareVs==='year'?'last year':'previous period'}`
    : custom ? 'custom range'
    : ((GSC_PERIOD_OPTS.find(o=>o[0]===period)||['','this period'])[1]);
  const cards=State.gsc.map(p=>{
    const imprSeries=p.impr||[];
    const curC=gscWindow(p.series,n,0), prevC=gscWindow(p.series,n,cmpBack);
    const curI=gscWindow(imprSeries,n,0),   prevI=gscWindow(imprSeries,n,cmpBack);
    const chgC=gscPct(curC.total,prevC.total), chgI=gscPct(curI.total,prevI.total);
    const svg=gscChart(p.domain, curC.slice, prevC.slice, curI.slice, showImpr);
    const dates=[]; const L=curC.slice.length;
    for(let i=0;i<L;i++) dates.push(new Date(Date.now()-(L-1-i)*86400000));
    Object.assign(State._gscView[p.domain]||(State._gscView[p.domain]={}), {curVals:curC.slice, prevVals:prevC.slice, imVals:showImpr?curI.slice:null, dates, back:cmpBack});
    const clkRow=`<div class="gsc-metric-row">${GSC_ICO_CLK}<span class="gsc-num">${fmtMetric(curC.total)}</span><span class="gsc-chg ${gscDir(chgC)}">${gscArrow(chgC)}${Math.abs(chgC)}%</span></div>`;
    const impRow=showImpr?`<div class="gsc-metric-row">${GSC_ICO_IMP}<span class="gsc-num">${fmtMetric(curI.total)}</span><span class="gsc-chg ${gscDir(chgI)}">${gscArrow(chgI)}${Math.abs(chgI)}%</span></div>`:'';
    return `<div class="gsc-card" data-domain="${esc(p.domain)}">
      <div class="gsc-top">
        <div class="gsc-fav" style="background:${colorFor(p.domain)}">${esc(p.domain.slice(0,1).toUpperCase())}</div>
        <div class="gsc-dom">${esc(p.domain)}</div>
        <div class="gsc-metrics">${clkRow}${impRow}</div>
      </div>
      ${svg}
      <div class="gsc-foot"><span class="gf">🔑 ${fmtMetric(p.keywords)} keywords</span><span class="gf">⌀ pos ${p.position}</span><button class="gsc-an" data-domain="${esc(p.domain)}">✨ Analyze</button></div>
    </div>`;
  }).join('');

  const periodSel=`<select id="gscPeriod" class="compact">${GSC_PERIOD_OPTS.map(o=>`<option value="${o[0]}" ${period===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>`;
  const eyeBtn=`<button class="gsc-toggle ${showImpr?'on':''}" id="gscEye">${GSC_ICO_IMP.replace('gsc-mico','sw')} Impressions</button>`;
  const customCtrl = custom ? `<input type="date" id="gscFrom" class="compact" value="${(State.gscCustom&&State.gscCustom.from)||''}"/><span style="color:var(--faint)">→</span><input type="date" id="gscTo" class="compact" value="${(State.gscCustom&&State.gscCustom.to)||''}"/>` : '';
  const compareCtrl = compare ? `<select id="gscCmpLen" class="compact">${[['7d','7 days'],['14d','14 days'],['28d','28 days'],['3m','3 months'],['6m','6 months'],['12m','12 months']].map(o=>`<option value="${o[0]}" ${(State.gscCompareLen||'28d')===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select><span style="color:var(--faint)">vs</span><select id="gscCmpVs" class="compact"><option value="previous" ${(State.gscCompareVs||'previous')==='previous'?'selected':''}>Previous period</option><option value="year" ${State.gscCompareVs==='year'?'selected':''}>Same period last year</option></select>` : '';

  v.innerHTML=`
  ${ connected ? '' : `<div class="notice no-print">📊 Showing <b>sample data</b> so you can see the layout. Connect Google Search Console (setup guide → Integrations) and these become your real properties, pulled live. The dashed line is the previous period — hover any chart to compare day by day.</div>` }
  <div class="gsc-controls">
    <span style="color:var(--muted);font-size:13px">${State.gsc.length} properties</span>
    <div class="spacer" style="flex:1"></div>
    ${eyeBtn}
    ${ connected ? '' : `<button class="btn sm" id="gscConnect">Connect Google Search Console</button>` }
    ${customCtrl}${compareCtrl}${periodSel}
  </div>
  <div class="gsc-grid">${cards}</div>`;

  $('#gscPeriod').onchange=e=>{State.gscPeriod=e.target.value;viewDashboard(v);};
  $('#gscEye').onclick=()=>{State.gscShowImpr=!State.gscShowImpr;viewDashboard(v);};
  const f=$('#gscFrom'), t=$('#gscTo');
  if(f) f.onchange=e=>{State.gscCustom={...(State.gscCustom||{}),from:e.target.value};viewDashboard(v);};
  if(t) t.onchange=e=>{State.gscCustom={...(State.gscCustom||{}),to:e.target.value};viewDashboard(v);};
  const cl=$('#gscCmpLen'), cvs=$('#gscCmpVs');
  if(cl) cl.onchange=e=>{State.gscCompareLen=e.target.value;viewDashboard(v);};
  if(cvs) cvs.onchange=e=>{State.gscCompareVs=e.target.value;viewDashboard(v);};
  const gc=$('#gscConnect'); if(gc) gc.onclick=()=>toast('Google sign-in gets wired here once /api/gsc + Google OAuth are set up.');

  // hover-to-compare on each chart
  v.querySelectorAll('.gsc-spark').forEach(svg=>{
    const dom=svg.dataset.domain, d=State._gscView[dom]; if(!d) return;
    const guide=svg.querySelector('.gsc-guide'), dotC=svg.querySelector('.gd-cl'), dotI=svg.querySelector('.gd-im');
    svg.onmousemove=e=>{
      const r=svg.getBoundingClientRect(), frac=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
      const i=Math.round(frac*(d.cl.length-1)); if(!d.cl[i]) return;
      guide.setAttribute('x1',d.cl[i].x); guide.setAttribute('x2',d.cl[i].x); guide.style.opacity='1';
      dotC.setAttribute('cx',d.cl[i].x); dotC.setAttribute('cy',d.cl[i].y); dotC.style.opacity='1';
      if(d.im&&d.im[i]){ dotI.setAttribute('cx',d.im[i].x); dotI.setAttribute('cy',d.im[i].y); dotI.style.opacity='1'; } else dotI.style.opacity='0';

  });

  // AI analysis per property (respects the selected period / comparison)

/* the actual from/to dates for the currently selected period (for live dimension tables) */
function gscRange(){
  const R=gscResolve(), fmt=d=>d.toISOString().slice(0,10);
  if(R.custom && State.gscCustom && State.gscCustom.from && State.gscCustom.to){
    return { from:State.gscCustom.from, to:State.gscCustom.to };
  }
  const to=new Date(), from=new Date(); from.setDate(from.getDate()-(R.n-1));
  return { from:fmt(from), to:fmt(to) };
}
/* fetch the four dimension tables for one property + date range, cache, re-render */
async function fetchGscDims(domain, from, to){
  const key=domain+'|'+from+'|'+to;
  if(State.gscDims[key]||State.gscDims['load:'+key]) return;
  State.gscDims['load:'+key]=true;
  try{
    const res=await fetch(`/api/gsc?detail=${encodeURIComponent(domain)}&from=${from}&to=${to}`);
    if(res.ok){ const j=await res.json(); if(j&&(j.queries||j.pages||j.countries||j.devices)){
      State.gscDims[key]={ queries:j.queries||[], pages:j.pages||[], countries:j.countries||[], devices:j.devices||[] }; } }
  }catch(e){}
  delete State.gscDims['load:'+key];
  if(State.route==='dashboard' && State.gscDetail===domain){ const p=State.gsc.find(x=>x.domain===domain); if(p) renderGscDetail($('#view'),p); }
}

/* resolve the selected period into a window length, comparison offset, and label */
function gscResolve(){
  const period=State.gscPeriod, compare=period==='compare', custom=period==='custom';
  let n, cmpBack=365;
  if(custom){ const c=State.gscCustom||{}; n=(c.from&&c.to)?Math.max(1,Math.round((new Date(c.to)-new Date(c.from))/86400000)+1):28; cmpBack=n; }
  else if(compare){ n=gscPeriodDays(State.gscCompareLen||'28d'); cmpBack=(State.gscCompareVs==='year')?365:n; }
  else { n=gscPeriodDays(period); cmpBack=n; }
  const periodText = compare ? `${(State.gscCompareLen||'28d')} vs ${State.gscCompareVs==='year'?'last year':'previous period'}` : custom ? 'custom range' : ((GSC_PERIOD_OPTS.find(o=>o[0]===period)||['','this period'])[1]);
  return {period,compare,custom,n,cmpBack,periodText};
}
function gscPeriodControlsHTML(R){
  const periodSel=`<select id="gscPeriod" class="compact">${GSC_PERIOD_OPTS.map(o=>`<option value="${o[0]}" ${R.period===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>`;
  const customCtrl = R.custom ? `<input type="date" id="gscFrom" class="compact" value="${(State.gscCustom&&State.gscCustom.from)||''}"/><span style="color:var(--faint)">→</span><input type="date" id="gscTo" class="compact" value="${(State.gscCustom&&State.gscCustom.to)||''}"/>` : '';
  const compareCtrl = R.compare ? `<select id="gscCmpLen" class="compact">${[['7d','7 days'],['14d','14 days'],['28d','28 days'],['3m','3 months'],['6m','6 months'],['12m','12 months']].map(o=>`<option value="${o[0]}" ${(State.gscCompareLen||'28d')===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select><span style="color:var(--faint)">vs</span><select id="gscCmpVs" class="compact"><option value="previous" ${(State.gscCompareVs||'previous')==='previous'?'selected':''}>Previous period</option><option value="year" ${State.gscCompareVs==='year'?'selected':''}>Same period last year</option></select>` : '';

function wireGscPeriodControls(v){

/* =========================================================================
   GSC PROPERTY DETAIL — looks like the real Search Console performance view
   ========================================================================= */
const DET_W=820, DET_H=240, DET_PAD=8;
function renderGscDetail(v,p){
  const R=gscResolve(), m=State.gscMetrics;
  const clicks=gscWindow(p.series,R.n,0), imprs=gscWindow(p.impr||[],R.n,0);
  const clicksSlice=clicks.slice, imprSlice=imprs.slice;
  const ctrSlice=clicksSlice.map((c,i)=> imprSlice[i]? +(c/imprSlice[i]*100).toFixed(2):0);
  const posSlice=gscWindow(p.pos||[],R.n,0).slice;
  const totClicks=clicks.total, totImpr=imprs.total;
  const avgCtr= totImpr? (totClicks/totImpr*100):0;
  const avgPos= posSlice.length? posSlice.reduce((a,b)=>a+b,0)/posSlice.length:0;

  const metricCfg={
    clicks:{label:'Total clicks', val:fmtMetric(totClicks), color:'var(--brand)', vals:clicksSlice, fmt:x=>fmtMetric(x)},
    impr:{label:'Total impressions', val:fmtMetric(totImpr), color:'var(--violet)', vals:imprSlice, fmt:x=>fmtMetric(x)},
    ctr:{label:'Average CTR', val:avgCtr.toFixed(1)+'%', color:'var(--green)', vals:ctrSlice, fmt:x=>x.toFixed(1)+'%'},
    pos:{label:'Average position', val:avgPos.toFixed(1), color:'var(--amber)', vals:posSlice, fmt:x=>x.toFixed(1), invert:true}
  };
  const active=Object.keys(metricCfg).filter(k=>m[k] && metricCfg[k].vals.length);

  // build chart
  const dates=[]; for(let i=0;i<clicksSlice.length;i++) dates.push(new Date(Date.now()-(clicksSlice.length-1-i)*86400000));
  let polys='', dots=''; const ptsByMetric={};
  active.forEach(k=>{
    const cfg=metricCfg[k]; let vals=cfg.vals.slice();
    if(cfg.invert){ const mx=Math.max(...vals); vals=vals.map(x=>mx-x); } // lower position = higher on chart
    const ln=gscLine(vals,DET_W,DET_H,DET_PAD);
    ptsByMetric[k]=ln.pts;
    if(k==='clicks') polys+=`<polyline points="${ln.area}" fill="var(--brand-soft)" stroke="none"/>`;
    polys+=`<polyline points="${ln.poly}" fill="none" stroke="${cfg.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
    dots+=`<circle class="dd dd-${k}" r="3.6" fill="${cfg.color}" style="opacity:0"/>`;
  });
  State._gscDetailView={dates, active, ptsByMetric, metricCfg};
  const chart = active.length ? `<svg class="dchart" viewBox="0 0 ${DET_W} ${DET_H}" preserveAspectRatio="none">
      ${polys}<line class="gsc-guide dgd" x1="0" y1="4" x2="0" y2="${DET_H-4}"/>${dots}</svg>` : `<div class="empty" style="padding:40px">Turn on a metric above to see the chart.</div>`;
  const legend = `<div class="dlegend">${active.map(k=>`<span class="dl"><span class="sw" style="background:${metricCfg[k].color}"></span>${metricCfg[k].label}</span>`).join('')}</div>`;

  const tiles = Object.keys(metricCfg).map(k=>`<div class="mtile m-${k} ${m[k]?'on':'off'}" data-m="${k}"><div class="ml">${metricCfg[k].label}</div><div class="mv">${metricCfg[k].val}</div></div>`).join('');

  // dimension table — follows the selected period (fetched live when connected)
  const dim=State.gscDimTab||'queries';
  const connected=!!State.settings.gscConnected;
  const range=gscRange(), dimsKey=p.domain+'|'+range.from+'|'+range.to;
  const pd=State.gscDims[dimsKey];
  const loadingDims = connected && !pd;
  if(loadingDims) fetchGscDims(p.domain, range.from, range.to);
  const src = pd || (connected ? {queries:[],pages:[],countries:[],devices:[]} : p); // sample mode uses base demo
  const dimMeta={queries:['Query','q',src.queries], pages:['Page','url',src.pages], countries:['Country','country',src.countries], devices:['Device','device',src.devices]};
  const [dimLabel,key,listRaw]=dimMeta[dim]||dimMeta.queries;
  const list=(listRaw||[]).slice().sort((a,b)=>b.clicks-a.clicks);
  const tableRows=list.map(r=>`<tr><td>${esc(String(r[key]))}</td><td class="num">${fmtMetric(r.clicks)}</td><td class="num">${fmtMetric(r.impressions)}</td><td class="num">${(r.ctr).toFixed(1)}%</td><td class="num">${(r.position).toFixed(1)}</td></tr>`).join('');
  const emptyRow = loadingDims ? `<tr><td colspan="5" style="color:var(--muted)">Loading ${dim} for this period…</td></tr>` : `<tr><td colspan="5" style="color:var(--muted)">No data for this period</td></tr>`;
  const tabs=['queries','pages','countries','devices'].map(t=>`<button class="dtab ${dim===t?'active':''}" data-dim="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('');

  v.innerHTML=`
  <div class="audit-bar">
    <button class="btn sm ghost" id="gdBack">← All properties</button>
    <div class="gsc-fav" style="background:${colorFor(p.domain)};width:24px;height:24px;font-size:12px">${esc(p.domain.slice(0,1).toUpperCase())}</div>
    <b style="font-size:15px">${esc(p.domain)}</b>
    <div class="spacer" style="flex:1"></div>
    ${gscPeriodControlsHTML(R)}
    <button class="ai-btn" id="gdAI">✨ Analyze with AI</button>
  </div>
  <div class="metric-tiles">${tiles}</div>
  <div class="panel"><div style="padding:14px 16px">${chart}${legend}</div></div>
  <div class="dtabs">${tabs}</div>
  <div class="dtable-wrap"><table class="dtable"><thead><tr><th>${dimLabel}</th><th class="num">Clicks</th><th class="num">Impressions</th><th class="num">CTR</th><th class="num">Position</th></tr></thead><tbody>${tableRows||emptyRow}</tbody></table></div>`;

  $('#gdBack').onclick=()=>{ State.gscDetail=null; render(); };
  wireGscPeriodControls(v);
  v.querySelectorAll('.mtile').forEach(t=>t.onclick=()=>{ const k=t.dataset.m; State.gscMetrics={...State.gscMetrics,[k]:!State.gscMetrics[k]}; renderGscDetail(v,p); });
  v.querySelectorAll('.dtab').forEach(t=>t.onclick=()=>{ State.gscDimTab=t.dataset.dim; renderGscDetail(v,p); });
  $('#gdAI').onclick=()=>{ const pp = pd ? {...p, queries:pd.queries, pages:pd.pages, countries:pd.countries, devices:pd.devices} : p;
    runAI({ kind:'console', domain:p.domain, period:R.periodText, kicker:'Search Console · '+R.periodText, data:consolePayload(pp,R.n,R.cmpBack,R.periodText), local:()=>buildConsoleSummary(pp,R.n,R.cmpBack,R.periodText) }); };

  // chart hover
  const svg=v.querySelector('.dchart');
  if(svg){
    const guide=svg.querySelector('.dgd');
    svg.onmousemove=e=>{
      const D=State._gscDetailView; if(!D.active.length) return;
      const r=svg.getBoundingClientRect(), frac=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
      const ref=D.ptsByMetric[D.active[0]]; const i=Math.round(frac*(ref.length-1)); if(!ref[i]) return;
      guide.setAttribute('x1',ref[i].x); guide.setAttribute('x2',ref[i].x); guide.style.opacity='1';
      D.active.forEach(k=>{ const dot=svg.querySelector('.dd-'+k), pt=D.ptsByMetric[k][i]; if(dot&&pt){ dot.setAttribute('cx',pt.x); dot.setAttribute('cy',pt.y); dot.style.opacity='1'; } });
      showDetailTip(e.clientX,e.clientY,i);
    };
    svg.onmouseleave=()=>{ guide.style.opacity='0'; svg.querySelectorAll('.dd').forEach(d=>d.style.opacity='0'); hideGscTip(); };
  }
}
function showDetailTip(px,py,i){
  const D=State._gscDetailView; const d=D.dates[i]; if(!d) return;
  const fmtD=x=>x.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
  let html=`<div class="tt-date">${fmtD(d)} · ${d.getFullYear()}</div>`;
  D.active.forEach(k=>{ const c=D.metricCfg[k]; html+=`<div class="tt-row"><span class="tt-k"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${c.color};margin-right:6px"></span>${c.label}</span><span><b>${c.fmt(c.vals[i])}</b></span></div>`; });
  const tip=gscTipEl(); tip.innerHTML=html; tip.style.display='block';
  const x=Math.min(window.innerWidth-tip.offsetWidth-12, px+14), y=Math.max(12, py-tip.offsetHeight-12);
  tip.style.left=x+'px'; tip.style.top=y+'px';
}

async function loadDashboard(){
  try{
    const res=await fetch('/api/gsc');

    else State.gsc=[];
  }catch(e){ State.gsc=[]; }
}

function domainOf(s){ return String(s||'').replace(/^https?:\/\//,'').replace(/^www\./,'').replace(/\/.*$/,'').trim(); }
function drColor(dr){ return dr>=60?'var(--green)':(dr>=40?'var(--amber)':'var(--red)'); }
State._auditCache = State._auditCache || {};
async function loadAudit(target){
  const fail=()=>{ State._auditCache[target]={domain:target,connected:false,error:true,history:{dates:[]},latest:[],tracked:[]}; };
  try{
    const res=await fetch('/api/ahrefs?target='+encodeURIComponent(target));
    const d=await res.json();
    if(!d || d.error){ fail(); }
    else {
      d.connected=true; d.error=false;
      d.dr = d.dr!=null?Math.round(d.dr):null; d.ur = d.ur!=null?+(+d.ur).toFixed(1):null;
      d.latest=(d.latest_backlinks||[]).map(b=>({source:domainOf(b.url_from),dr:Math.round(b.domain_rating_source||0),traffic:b.traffic_domain||0,anchor:b.anchor||'—',first_seen:new Date(b.first_seen||Date.now()),dofollow:b.is_dofollow!==false}));
      d.tracked=(d.keywords_list||[]).filter(k=>k.keyword).map(k=>({kw:k.keyword,pos:k.best_position||0,change:(k.best_position_diff!=null?-k.best_position_diff:0),vol:k.volume||0,url:(k.best_position_url||'').replace(/^https?:\/\/[^/]+/,'')||'/'}));
      State._auditCache[target]=d;
    }
  }catch(e){ fail(); }
  if(State.route==='audit') render();
}

function paintAudit(d){

function paintChart(d){ const el=$('#audChart'); if(!el) return; el.innerHTML=auditChartSVG(d); wireAuditHover(d); }

function auditChartSVG(d){
  const tab=State.auditTab||'general', keys=AUDIT_TABS[tab];
  const active=(State.auditActive&&State.auditActive[tab])||{};
  const H=d.history||{}, dates=H.dates||[];
  if(!dates.length) return `<div class="loading-block" style="padding:30px">No history data for this domain</div>`;
  const W=920,HT=300,PL=46,PR=58,PT=14,PB=28;
  const actKeys=keys.filter(k=>active[k]);
  const rightKeys=actKeys.filter(k=>AUDIT_METRICS[k].axis==='right');
  const leftOn=actKeys.some(k=>AUDIT_METRICS[k].axis==='left');
  let rightMax=0; rightKeys.forEach(k=>(H[k]||[]).forEach(v=>{ if(v!=null&&v>rightMax) rightMax=v; })); rightMax=rightMax||1;
  const n=dates.length;
  const X=i=> PL+(n<=1?0:i*(W-PL-PR)/(n-1));
  const yL=v=> HT-PB-(Math.min(v,100)/100)*(HT-PT-PB);
  const yR=v=> HT-PB-(v/rightMax)*(HT-PT-PB);
  let grid='';
  [0,25,50,75,100].forEach(t=>{ const y=yL(t); grid+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" class="aud-grid"/>`+(leftOn?`<text x="${PL-7}" y="${(y+3).toFixed(1)}" text-anchor="end" class="aud-axt">${t}</text>`:''); });
  if(rightKeys.length){ for(let i=0;i<=4;i++){ const val=rightMax*i/4, y=yR(val); grid+=`<text x="${W-PR+7}" y="${(y+3).toFixed(1)}" class="aud-axt">${fmtMetric(val)}</text>`; } }
  let paths='';
  actKeys.forEach(k=>{ const m=AUDIT_METRICS[k], arr=H[k]||[], yf=m.axis==='left'?yL:yR, pts=[];
    arr.forEach((val,i)=>{ if(val!=null) pts.push(`${X(i).toFixed(1)},${yf(val).toFixed(1)}`); });
    if(pts.length) paths+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${m.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  });
  let xl=''; const step=Math.max(1,Math.round(n/6));

function wireAuditHover(d){

    const gx=PL+(n<=1?0:i*(W-PL-PR)/(n-1)); if(guide){ guide.setAttribute('x1',gx); guide.setAttribute('x2',gx); guide.style.opacity='1'; }
    const dt=new Date(dates[i]);

function buildAuditSummary(d){
  const tr=d.tracked||[], lt=d.latest||[];
  const top3=tr.filter(k=>k.pos&&k.pos<=3).length, improvedK=tr.filter(k=>k.change>0), declinedK=tr.filter(k=>k.change<0);
  const avgDr=lt.length?Math.round(lt.reduce((a,b)=>a+b.dr,0)/lt.length):0;
  const fc=(v)=>v==null?'':` (${v>0?'+':''}${fmtMetric(v)} over 3mo)`;
  const bullets=[
    `Domain Rating <b>${nz(d.dr)}</b>${fc(d.dr_change)}; URL Rating ${d.ur!=null?d.ur:'—'}.`,
    `Organic: <b>${nz(d.org_traffic)}</b> visits/mo${fc(d.org_traffic_change)} across <b>${nz(d.org_keywords)}</b> keywords${fc(d.org_keywords_change)}; <b>${nz(d.top3)}</b> in top 3.`,
    `Backlinks: <b>${nz(d.backlinks)}</b>${fc(d.backlinks_change)} from <b>${nz(d.refdomains)}</b> referring domains${fc(d.refdomains_change)}.`
  ];
  if(lt.length) bullets.push(`Newest strong link from <b>${esc(lt[0].source)}</b> (DR ${lt[0].dr}); avg DR of recent links ≈ ${avgDr}.`);
  const aiTot=Object.values(d.ai||{}).reduce((s,o)=>s+((o&&o.citations)||0),0);
  if(aiTot) bullets.push(`Cited <b>${aiTot}</b> time(s) across AI engines (AI Overviews, ChatGPT, etc.).`);
  const recs=[];
  if(d.org_traffic_change!=null&&d.org_traffic_change<0) recs.push('Recover lost organic traffic — refresh declining pages and match search intent.');
  if(declinedK.length) recs.push(`Reclaim slipping keywords — strengthen "${declinedK[0].kw}" with content and internal links.`);
  if(avgDr&&avgDr<35) recs.push('Pursue higher-DR referring domains — recent links skew low-authority.');
  if(!aiTot) recs.push('Add clear, citable answers and schema to earn AI-engine citations.');
  recs.push('Log priority fixes as tasks and send to the client team to track implementation.');
  return {bullets, recommendations:recs};
}

function consolePayload(p,n,cmpBack,periodText){
  const cur=gscWindow(p.series,n,0).total, prev=gscWindow(p.series,n,cmpBack).total;
  const impTot=gscWindow(p.impr||[],n,0).total, posSl=gscWindow(p.pos||[],n,0).slice;
  return {domain:p.domain, period:periodText, clicks_current:cur, clicks_comparison:prev,
    impressions:impTot, avg_ctr_pct:impTot?+(cur/impTot*100).toFixed(2):0,
    avg_position:posSl.length?+(posSl.reduce((a,b)=>a+b,0)/posSl.length).toFixed(1):0,
    queries:p.queries||[], pages:p.pages||[], countries:p.countries||[], devices:p.devices||[]};
}
function buildConsoleSummary(p,n,cmpBack,periodText){
  const cur=gscWindow(p.series,n,0).total, prev=gscWindow(p.series,n,cmpBack).total, clkChg=gscPct(cur,prev);
  const bullets=[`Clicks ${clkChg>=0?'up':'down'} <b>${Math.abs(clkChg)}%</b> over ${periodText} (<b>${fmtMetric(cur)}</b> vs ${fmtMetric(prev)}).`];
  const q=p.queries||[], pg=p.pages||[];
  if(q.length){
    const topQ=[...q].sort((a,b)=>b.clicks-a.clicks)[0];
    const dropQ=[...q].map(x=>({...x,delta:gscPct(x.clicks,x.prev)})).sort((a,b)=>a.delta-b.delta)[0];
    bullets.push(`Top keyword by clicks: <b>${esc(topQ.q)}</b> (${fmtMetric(topQ.clicks)} clicks).`);
    bullets.push(`Biggest keyword drop: <b>${esc(dropQ.q)}</b> (${dropQ.delta}%).`);
  }
  if(pg.length){
    const top=[...pg].sort((a,b)=>b.clicks-a.clicks).slice(0,5);
    const drop=[...pg].map(x=>({...x,delta:gscPct(x.clicks,x.prev)})).filter(x=>x.delta<0).sort((a,b)=>a.delta-b.delta).slice(0,5);
    bullets.push(`Top 5 pages: ${top.map(x=>esc(x.url)+' ('+fmtMetric(x.clicks)+')').join(', ')}.`);
    bullets.push(drop.length?`Top 5 pages losing traffic: ${drop.map(x=>esc(x.url)+' ('+x.delta+'%)').join(', ')}.`:'No notable page declines this period.');
  }
  const next = n<=14?'next week':(n<=45?'next month':'next quarter');
  const recs=[];
  if(clkChg<0) recs.push(`Recover lost clicks — review the dropping pages' titles, intent match, and freshness.`);
  if(q.length){ const topQ=[...q].sort((a,b)=>b.clicks-a.clicks)[0]; recs.push(`Double down on "${topQ.q}" with supporting content and internal links.`); }
  recs.push(`Plan ${next}'s content around the rising queries and your highest-upside pages.`);
  recs.push('Turn these into tasks so the team can action them and report progress.');
  return {bullets, recommendations:recs};
}

function buildWorkloadSummary(){
  const t=visibleTasks();
  const cn=id=>(State.clients.find(c=>c.id===id)||{}).name||'No client';
  const pending=t.filter(x=>x.status==='todo'||x.status==='in_progress');
  const overdue=pending.filter(x=>x.dueDate&&daysFromToday(x.dueDate)<0);
  const dueSoon=pending.filter(x=>x.dueDate&&daysFromToday(x.dueDate)>=0&&daysFromToday(x.dueDate)<=7);
  const done=t.filter(x=>x.status==='done'), sent=t.filter(x=>x.status==='sent');
  const awaiting=sent.filter(x=>(x.clientOutcome||'pending')==='pending');
  const noDate=pending.filter(x=>!x.dueDate);
  const byClient={}; pending.forEach(x=>{const c=cn(x.clientId);byClient[c]=(byClient[c]||0)+1;});
  const topClients=Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const bullets=[
    `<b>${pending.length}</b> open across <b>${Object.keys(byClient).length}</b> clients · <b>${done.length}</b> done our end (not sent) · <b>${sent.length}</b> sent · <b>${awaiting.length}</b> awaiting client.`,

    dueSoon.length?`<b>${dueSoon.length}</b> due within 7 days.`:'Nothing due in the next 7 days.',
    topClients.length?`Heaviest load: ${topClients.map(([c,n])=>`<b>${esc(c)}</b> (${n})`).join(', ')}.`:''
  ].filter(Boolean);
  const recs=[];

function qbrClientChart(){
  const data=State.clients.map(c=>{
    const ts=State.tasks.filter(t=>t.clientId===c.id);
    const sent=ts.filter(t=>t.status==='sent').length;
    const ach=ts.filter(t=>t.clientOutcome==='implemented').length;
    return {name:c.name, pct: sent?Math.round(ach/sent*100):0, ach, sent};
  });
  const n=data.length, maxV=Math.max(0,...data.map(d=>d.pct));
  const niceMax=Math.min(100, Math.max(10, Math.ceil(maxV/10)*10));
  const step = niceMax<=50?10:20;
  const padL=44, padR=14, padT=18, padB=54, H=300;
  const colW=Math.max(64, Math.min(120, 760/n)); // shrink-to-fit-ish
  const W=Math.max(520, padL+padR+n*colW);
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const yOf=v=>padT+plotH*(1-v/niceMax);
  let grid='';
  for(let g=0; g<=niceMax; g+=step){ const y=yOf(g); grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-width="1"/><text x="${padL-8}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--faint)">${g}%</text>`; }
  const band=plotW/n, barW=Math.min(54, band*0.62);
  let bars='';
  data.forEach((d,i)=>{
    const x=padL+band*i+(band-barW)/2, y=yOf(d.pct), h=plotH-(y-padT);
    const col=colorFor(d.name);
    const label=d.name.length>11?d.name.slice(0,10)+'…':d.name;
    bars+=`<g><title>${esc(d.name)}: ${d.pct}% (${d.ach} of ${d.sent} delivered)</title>
      <rect x="${x}" y="${y}" width="${barW}" height="${Math.max(0,h)}" rx="5" fill="${col}"/>
      <text x="${x+barW/2}" y="${y-7}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--ink)">${d.pct}%</text>
      <text x="${x+barW/2}" y="${H-padB+18}" text-anchor="middle" font-size="11" fill="var(--muted)">${esc(label)}</text>
    </g>`;
  });
  return `<div class="chart-scroll"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" class="qbr-chart">
    <text x="14" y="${padT+plotH/2}" transform="rotate(-90 14 ${padT+plotH/2})" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--faint)" letter-spacing="0.05em">% IMPLEMENTED</text>
    ${grid}${bars}
  </svg></div>`;
}

/* =========================================================================
   QBR — Quarterly Business Review (per client, per quarter)
   A target stores only {title, priority, quantity}. Everything else
   (added / submitted / achieved) is DERIVED from the linked tasks, so
   marking a task "client did it" automatically advances the QBR.
   ========================================================================= */
const PRIOS=['High','Medium','Low'];
function curQuarter(d=new Date()){ return d.getFullYear()+'-Q'+(Math.floor(d.getMonth()/3)+1); }
function quarterOptions(){ const out=[]; const now=new Date(); let y=now.getFullYear(), q=Math.floor(now.getMonth()/3)+1; for(let i=0;i<6;i++){ out.push(y+'-Q'+q); q--; if(q<1){q=4;y--;} } return out; }
function qbrStats(target){
  const linked=State.tasks.filter(t=>t.qbrId===target.id);
  const qty=Math.max(1, target.quantity||1);
  const added=linked.length;
  const submitted=linked.filter(t=>t.status==='sent').length;
  const achieved=linked.filter(t=>t.clientOutcome==='implemented').length;
  let status='planned';
  if(achieved>=qty) status='achieved'; else if(added>=qty) status='submitted';
  return {linked, qty, added, submitted, achieved, remaining:Math.max(0,qty-added), status};
}
function dashBar(label,p,a,b,color){
  return `<div class="dash-item"><div class="dash-top"><span>${label}</span><b>${p}%</b></div>
    <div class="dash-track"><div class="dash-fill" style="width:${p}%;background:${color}"></div></div>
    <div class="dash-sub">${a} of ${b}</div></div>`;
}
function renderQbrTab(body, c){

  const yr=quarter.split('-Q')[0], qn=quarter.split('-Q')[1]||'1';

  let totQty=0,totAdded=0,totSub=0,totAch=0;
  targets.forEach(t=>{ const s=qbrStats(t); totQty+=s.qty; totAdded+=Math.min(s.added,s.qty); totSub+=Math.min(s.submitted,s.qty); totAch+=Math.min(s.achieved,s.qty); });
  const pct=(a,b)=> b?Math.round(a/b*100):0;

  const plannedByPrio=PRIOS.map(p=>{ const arr=planned.filter(t=>t.priority===p); if(!arr.length) return ''; return `<div class="qbr-prio-label prio-${p}">${p} priority <span class="count">${arr.length}</span></div>${arr.map(targetCard).join('')}`; }).join('');

  body.innerHTML=`

  const reKey=()=>{ State.qbrQuarter=$('#qbrYear').value+'-Q'+$('#qbrQ').value; clientDetail($('#view'),c); };
  $('#qbrYear').onchange=reKey; $('#qbrQ').onchange=reKey;
  $('#qbrManual').onclick=()=>qbrTargetForm(c,quarter);
  $('#qbrFile').onchange=async e=>{ const f=e.target.files[0]; if(!f)return; const st=$('#qbrGenStatus'); $('#qbrFileLabel').innerHTML=esc(f.name); st.textContent='Reading '+f.name+'…';

    catch(err){ st.textContent='Could not read that file automatically — please paste the text instead.'; } };
  $('#qbrAnalyze').onclick=()=>qbrRunAnalyze(c,quarter);
  body.querySelectorAll('.qbr-add').forEach(b=>b.onclick=()=>qbrAddToTasks(b.dataset.id,c));

  body.querySelectorAll('.qbr-del').forEach(b=>b.onclick=async()=>{ if(!confirm('Remove this QBR target? Tasks already created will stay.'))return; await Store.deleteQbr(b.dataset.id); await refresh(); clientDetail($('#view'),c); });
}
async function qbrRunAnalyze(c,quarter){
  const text=($('#qbrText').value||'').trim(), st=$('#qbrGenStatus'), btn=$('#qbrAnalyze');
  if(!text){ st.textContent='Upload a document or paste some notes first.'; return; }
  st.textContent='Analyzing…'; btn.disabled=true;
  let targets=null;
  try{ const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind:'qbr',data:{notes:text,client:c.name}})});
    if(res.ok){ const j=await res.json(); if(j&&Array.isArray(j.targets)&&j.targets.length) targets=j.targets; } }catch(e){}
  if(!targets) targets=parseQbrNotes(text);
  if(!targets.length){ st.textContent='Could not find any targets in that text.'; btn.disabled=false; return; }
  for(const t of targets){ await Store.saveQbr({ id:uid(), clientId:c.id, quarter, title:String(t.title).slice(0,160), priority:PRIOS.includes(t.priority)?t.priority:'Medium', quantity:Math.max(1,parseInt(t.quantity)||1), taskType:t.taskType||'Content', created_at:new Date().toISOString() }); }
  await refresh(); clientDetail($('#view'),c); toast(targets.length+' targets added');
}
async function qbrAddToTasks(targetId,c){

  const idx=s.added+1;
  const task={ id:uid(), title: s.qty>1?`${t.title} (${idx}/${s.qty})`:t.title, clientId:c.id,
    type:t.taskType||'Content', priority:t.priority, frequency:'One-off', dueDate:'', status:'todo',
    clientOutcome:'pending', resultLink:'', description:'From QBR · '+State.qbrQuarter, assignedBy:me().name,
    assignedTo:'', shareWith:[], qbrId:t.id, created_at:new Date().toISOString() };
  await Store.saveTask(task); await refresh(); clientDetail($('#view'),c);
  toast(s.qty>1?`Added ${idx} of ${s.qty} to tasks`:'Added to tasks');
}

function readDocFile(file){
  return new Promise((resolve,reject)=>{
    const name=(file.name||'').toLowerCase();
    if(name.endsWith('.docx')){
      const fr=new FileReader();
      fr.onload=()=>{ loadMammoth().then(()=>window.mammoth.extractRawText({arrayBuffer:fr.result}).then(r=>resolve(r.value)).catch(reject)).catch(reject); };
      fr.onerror=reject; fr.readAsArrayBuffer(file);
    } else { const fr=new FileReader(); fr.onload=()=>resolve(String(fr.result||'')); fr.onerror=reject; fr.readAsText(file); }
  });
}
function loadMammoth(){ if(window.mammoth) return Promise.resolve(); return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

/* ---- bulk task import from a document/image/pdf ---- */
function readBase64(file){ return new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(String(fr.result||'').split(',')[1]||''); fr.onerror=rej; fr.readAsDataURL(file); }); }
async function readAnyFile(file){
  const name=(file.name||'').toLowerCase(), type=file.type||'';
  if(name.endsWith('.docx')) return { text: await readDocFile(file) };
  if(type.startsWith('image/')) return { image: await readBase64(file), mediaType:type };
  if(name.endsWith('.pdf')||type==='application/pdf') return { pdf: await readBase64(file) };
  return { text: await readDocFile(file) }; // .txt / .md / other → plain text
}
function matchClient(name){
  if(!name) return null;
  const n=String(name).toLowerCase().replace(/[^a-z0-9]/g,''); if(!n) return null;
  let best=null;
  State.clients.forEach(c=>{ const cn=c.name.toLowerCase().replace(/[^a-z0-9]/g,''); if(cn&&(cn===n||cn.includes(n)||n.includes(cn))) best=c; });
  return best;
}
function parseTaskDoc(text){
  const out=[]; let cur=null;
  const isBullet=l=>/^\s*([-*•·▪◦]|\d+[.)])\s+/.test(l);
  text.split(/\r?\n/).forEach(raw=>{
    const line=raw.replace(/\t/g,' ').replace(/\s+$/,'');
    if(!line.trim()) return;
    if(isBullet(line)){ const title=line.replace(/^\s*([-*•·▪◦]|\d+[.)])\s+/,'').trim(); if(title) out.push({client:cur,title}); }
    else { cur=line.trim().replace(/^#+\s*/,'').replace(/[:#]+\s*$/,'').trim(); }
  });
  return out.filter(t=>t.title);
}
async function importTasksFromDoc(payload, fallbackClientId, statusEl){
