    if(payload.pdf){ body.data.pdf=payload.pdf; }
    const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(res.ok){ const j=await res.json(); if(j&&Array.isArray(j.tasks)&&j.tasks.length) items=j.tasks; }
  }catch(e){}
  if(!items && payload.text) items=parseTaskDoc(payload.text);
  if(!items||!items.length){
    statusEl.textContent = payload.text ? 'Could not find tasks in that document.' : 'Reading images / PDFs needs Claude connected. For now upload a .docx or .txt.';
    return null;
  }
  let made=0; const unmatched=new Set();
  for(const it of items){
    const c=matchClient(it.client)||(fallbackClientId?State.clients.find(x=>x.id===fallbackClientId):null);
    if(!c){ if(it.client) unmatched.add(it.client); continue; }
    await Store.saveTask({ id:uid(), title:String(it.title||'').slice(0,160), clientId:c.id,
      type:TASK_TYPES.includes(it.type)?it.type:'Other', priority:['High','Medium','Low'].includes(it.priority)?it.priority:'Medium',
      frequency:'One-off', dueDate:null, status:'todo', clientOutcome:'pending', resultLink:null,
      description:'Imported from document', assignedBy:'', assignedTo:'', shareWith:null, created_at:new Date().toISOString() });
    made++;
  }
  return { made, unmatched:[...unmatched] };
}
function parseQbrNotes(text){
  const out=[]; let curPrio='Medium';
  text.split(/\r?\n/).forEach(raw=>{
    let line=raw.trim().replace(/^[-*•\d.\)\s]+/,'').trim(); if(!line) return;
    const low=line.toLowerCase();
    const hMatch=low.match(/^(high|medium|low)\b[^:]*:?/);
    if(hMatch){ curPrio=hMatch[1][0].toUpperCase()+hMatch[1].slice(1); line=line.slice(hMatch[0].length).trim(); if(!line) return; }
    let prio=curPrio;
    if(/\b(high|urgent|critical|must)\b/.test(low)) prio='High';
    else if(/\b(low|nice to have|optional)\b/.test(low)) prio='Low';
    else if(/\b(medium|should)\b/.test(low)) prio='Medium';
    line.split(/[,;]| and /).map(s=>s.trim()).filter(s=>s.length>2).forEach(it=>{
      const qm=it.match(/(\d+)\s+(?:[a-z]+\s+){0,3}?(articles?|posts?|blogs?|pages?|links?|backlinks?|videos?|guides?|keywords?)/i);
      out.push({title:it.replace(/\s+/g,' ').trim(), priority:prio, quantity:qm?parseInt(qm[1]):1});
    });
  });
  return out.slice(0,40);
}

function inPeriod(iso,period){
  if(period==='all'||!iso) return period==='all'?true:false;
  const d=new Date(iso), now=new Date();
  if(period==='this_week'){ const s=startOfWeek(); return d>=s; }
  if(period==='last_week'){ const s=startOfWeek(); const ls=new Date(s); ls.setDate(ls.getDate()-7); return d>=ls&&d<s; }
  if(period==='this_month'){ return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }
  if(period==='this_quarter'){ const q=Math.floor(now.getMonth()/3); return Math.floor(d.getMonth()/3)===q&&d.getFullYear()===now.getFullYear(); }
  return true;
}
function periodSelect(val,stateKey,cb){
  const opts=[['this_week','This week'],['last_week','Last week'],['this_month','This month'],['this_quarter','This quarter'],['all','All time']];
  const id='ps_'+stateKey;
  setTimeout(()=>{ const el=document.getElementById(id); if(el) el.onchange=e=>{State[stateKey]=e.target.value;cb();}; },0);
  return `<select id="${id}" class="compact">${opts.map(o=>`<option value="${o[0]}" ${val===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>`;
}

function buildSlides(cands,client,period){
  const items=selectedTasks(cands);
  const byType={}; items.forEach(t=>{ (byType[t.type||'Other']=byType[t.type||'Other']||[]).push(t); });
  const implemented=items.filter(t=>t.clientOutcome==='implemented').length;
  const pending=items.filter(t=>(t.clientOutcome||'pending')==='pending'||t.status==='done').length;
  const notDone=items.filter(t=>t.clientOutcome==='not_implemented').length;
  let n=0; const slides=[];
  slides.push(`<div class="slide title-slide"><div class="kicker">${periodLabel(period)} · SEO Report</div><h2 class="s-title" style="font-size:38px;color:#fff">${esc(client.name)}</h2><div style="margin-top:14px;font-size:15px;color:#cdd9f5">Prepared by ${esc(me().name||'SEO team')} · ${fmtDateLong(new Date().toISOString())}</div></div>`);
  slides.push(`<div class="slide"><div class="kicker">Summary</div><h2 class="s-title">What we did this period</h2>
    <ul class="s-list">
      <li>✅ <b>${items.length}</b> deliverables completed across ${Object.keys(byType).length} area${Object.keys(byType).length!==1?'s':''}</li>
      <li>🚀 <b>${implemented}</b> implemented by the client team</li>
      <li>⏳ <b>${pending}</b> awaiting implementation</li>
      ${notDone?`<li>⚠️ <b>${notDone}</b> sent but not yet actioned by the client side</li>`:''}
    </ul><div class="s-num">${++n}</div></div>`);
  Object.keys(byType).forEach(type=>{
    const li=byType[type].map(t=>{
      const status = t.clientOutcome==='implemented'?'✓':(t.clientOutcome==='not_implemented'?'⚠':'•');
      return `<li><span>${status}</span><span style="flex:1">${esc(t.title)}</span></li>`;
    }).join('');
    slides.push(`<div class="slide"><div class="kicker">${esc(type)}</div><h2 class="s-title">${esc(type)}</h2><ul class="s-list">${li}</ul><div class="s-num">${++n}</div></div>`);
  });
  slides.push(`<div class="slide"><div class="kicker">Next</div><h2 class="s-title">Recommendations & next steps</h2><ul class="s-list">
    ${notDone?`<li>Follow up with client IT on ${notDone} pending recommendation${notDone>1?'s':''}</li>`:''}
    <li>[ Add your priorities for next period here ]</li>
    <li>[ Add any blockers waiting on the client ]</li>
  </ul><div class="s-num">${++n}</div></div>`);
  return slides.join('');
}

function reportPayload(items, client, period){
  const tag=t=>{ if(t.status==='sent'){ const o=t.clientOutcome||'pending'; return o==='implemented'?'implemented':o==='not_implemented'?'not done by client':'awaiting client'; } return t.status; };
  const byType={}; items.forEach(t=>{ (byType[t.type||'Other']=byType[t.type||'Other']||[]).push({title:t.title, status:tag(t)}); });
  const notCompleted=State.tasks.filter(t=>t.clientId===client.id && (t.status==='todo'||t.status==='in_progress')).map(t=>t.title);
  return { client:client.name, period:periodLabel(period), website:client.website||'', work_by_area:byType, not_completed:notCompleted, slide_format:(State.settings.reportFormat||'') };
}
function buildReportSummary(items, client, period){
  const implemented=items.filter(t=>t.clientOutcome==='implemented').length;
  const pending=items.filter(t=>(t.clientOutcome||'pending')==='pending'||t.status==='done').length;
  const notDone=items.filter(t=>t.clientOutcome==='not_implemented').length;
  const byType={}; items.forEach(t=>{ byType[t.type||'Other']=(byType[t.type||'Other']||0)+1; });
  const areas=Object.keys(byType);
  const bullets=[
    `<b>${items.length}</b> deliverables completed for <b>${esc(client.name)}</b> across ${areas.length} area${areas.length!==1?'s':''} this ${periodLabel(period).toLowerCase()}.`,
    `Client side: <b>${implemented}</b> implemented, <b>${pending}</b> awaiting action${notDone?`, <b>${notDone}</b> not actioned`:''}.`,
    areas.length?`Focus areas: ${areas.map(a=>`<b>${esc(a)}</b> (${byType[a]})`).join(', ')}.`:''
  ].filter(Boolean);
  const recs=[ 'Confirm next-period priorities with the client.', notDone?`Follow up on ${notDone} recommendation${notDone>1?'s':''} not yet actioned client-side.`:'Keep momentum on implemented wins and measure impact.' ].filter(Boolean);
  return {bullets, recommendations:recs};
}

    <div class="modal-body"><div class="form-grid">
      ${ !task ? `<div class="full"><div class="import-box">
        <div class="import-h">⚡ Bulk import from a document</div>
        <div class="import-p">Upload your day's worklist — clients as headings, tasks as bullets under each. AI reads it and creates one task per bullet under the matching client.</div>
        <label class="filebox" id="tiDrop"><input type="file" id="tiFile" accept=".txt,.md,.docx,.pdf,image/*" hidden><span class="filebox-ic">⬆️</span><span id="tiLabel">Upload .docx, .txt, PDF or image</span></label>
        <div id="tiStatus" class="qbr-gen-status"></div>
        <button class="btn sm primary" id="tiRun" style="margin-top:8px" disabled>✨ Create tasks from document</button>
        <div class="import-or">— or add a single task below —</div>
      </div></div>` : '' }
      <div class="full"><label>Task title</label><input type="text" id="tTitle" placeholder="e.g. Keyword research for the plumbing services page" value="${esc(t.title||'')}"/></div>
      <div><label>Client</label><select id="tClient"><option value="">— Select client —</option>${State.clients.map(c=>`<option value="${c.id}" ${t.clientId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <div><label>Type</label><select id="tType">${TASK_TYPES.map(x=>`<option ${t.type===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div><label>Priority</label><select id="tPrio">${['High','Medium','Low'].map(p=>`<option ${t.priority===p?'selected':''}>${p}</option>`).join('')}</select></div>
      <div><label>Frequency</label><select id="tFreq">${['One-off','Daily','Weekly','Monthly','Quarterly'].map(f=>`<option ${t.frequency===f?'selected':''}>${f}</option>`).join('')}</select></div>
      <div><label>${assignMode?'Date needed by':'Due date'}</label><input type="date" id="tDue" value="${t.dueDate||''}"/></div>
      <div><label>Deliverable link (optional)</label><input type="url" id="tLink" placeholder="https://…" value="${esc(t.resultLink||'')}"/></div>
      <div class="full"><label>${assignMode?'Brief / explanation':'Notes'}</label><textarea id="tDesc" rows="3" placeholder="${assignMode?'Explain what needs doing and any context…':'Optional notes…'}">${esc(t.description||'')}</textarea></div>
      ${ assignMode ? `
        <div><label>Assign to</label><select id="tAssignTo">${teamOpts}</select></div>
        <div><label>Share result with (optional)</label><input type="text" id="tShare" placeholder="e.g. Client IT team, Account manager" value="${esc(t.shareWith||'')}"/></div>
      `:''}
    </div></div>
    <div class="modal-foot"><button class="btn" id="mCancel">Cancel</button><button class="btn primary" id="mSave">${task?'Save changes':(assignMode?'Assign task':'Create task')}</button></div>
  `);
  $('#mx').onclick=$('#mCancel').onclick=closeModal;
  if(!task){
    let payload=null;
    const fileEl=$('#tiFile'), runEl=$('#tiRun'), stEl=$('#tiStatus');
    if(fileEl){
      fileEl.onchange=async e=>{ const f=e.target.files[0]; if(!f)return; $('#tiLabel').textContent=f.name; stEl.textContent='Reading '+f.name+'…'; runEl.disabled=true;
        try{ payload=await readAnyFile(f); stEl.textContent = payload.text!==undefined ? ('Loaded '+f.name+' — ready to create tasks.') : ('Loaded '+f.name+' — needs Claude connected to read it.'); runEl.disabled=false; }
        catch(err){ stEl.textContent='Could not read that file. Try a .docx or .txt, or paste tasks below.'; } };
      runEl.onclick=async()=>{ if(!payload){ stEl.textContent='Upload a document first.'; return; } runEl.disabled=true; stEl.textContent='Creating tasks…';
        const fb=opts.clientId||t.clientId||null;
        const r=await importTasksFromDoc(payload, fb, stEl);
        if(r){ await refresh(); closeModal(); render(); toast(r.made+' task'+(r.made!==1?'s':'')+' created'+(r.unmatched.length?` · ${r.unmatched.length} client(s) not matched`:'')); }
        else { runEl.disabled=false; }
      };
    }
  }
  $('#mSave').onclick=async()=>{
    const title=$('#tTitle').value.trim(); if(!title){toast('Give the task a title');return;}
    t.title=title; t.clientId=$('#tClient').value||null; t.type=$('#tType').value; t.priority=$('#tPrio').value;
    t.frequency=$('#tFreq').value; t.dueDate=$('#tDue').value||null; t.resultLink=$('#tLink').value.trim()||null;
    t.description=$('#tDesc').value.trim()||null;
    if(assignMode){ t.assignedBy=t.assignedBy||me().name; t.assignedTo=$('#tAssignTo').value; t.shareWith=$('#tShare').value.trim()||null; }
    if(!t.created_at) t.created_at=new Date().toISOString();
    await Store.saveTask(t); await refresh(); closeModal(); render(); toast(task?'Task updated':'Task created');
  };
  setTimeout(()=>$('#tTitle')&&$('#tTitle').focus(),50);
}

function clientForm(client){
  const c=client||{id:uid()};
  openModal(`
    <div class="modal-head"><h3>${client?'Edit client':'Add client'}</h3><button class="x" id="mx">×</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="full"><label>Client name</label><input type="text" id="cName" value="${esc(c.name||'')}" placeholder="e.g. Acme Plumbing"/></div>
      <div><label>Website</label><input type="url" id="cWeb" value="${esc(c.website||'')}" placeholder="https://…"/></div>
      <div><label>Main contact</label><input type="text" id="cContact" value="${esc(c.contact||'')}"/></div>
      <div class="full"><label>Client IT / dev contact (who implements your recs)</label><input type="text" id="cIt" value="${esc(c.itContact||'')}"/></div>
      <div class="full"><label>Notes</label><textarea id="cNotes" rows="2">${esc(c.notes||'')}</textarea></div>
    </div></div>
    <div class="modal-foot">${client?`<button class="btn danger" id="cDel" style="margin-right:auto">Delete client</button>`:''}<button class="btn" id="mCancel">Cancel</button><button class="btn primary" id="mSave">${client?'Save':'Add client'}</button></div>
  `);
  $('#mx').onclick=$('#mCancel').onclick=closeModal;
  $('#mSave').onclick=async()=>{
    const name=$('#cName').value.trim(); if(!name){toast('Client needs a name');return;}
    c.name=name; c.website=$('#cWeb').value.trim()||null; c.contact=$('#cContact').value.trim()||null;
    c.itContact=$('#cIt').value.trim()||null; c.notes=$('#cNotes').value.trim()||null;
    await Store.saveClient(c); await refresh(); closeModal(); render(); toast(client?'Client saved':'Client added');
  };
  if(client) $('#cDel').onclick=async()=>{ if(confirm('Delete '+c.name+'? Tasks stay but lose their client tag.')){ await Store.deleteClient(c.id); State.clientId=null; await refresh(); closeModal(); render(); toast('Client deleted'); } };
  setTimeout(()=>$('#cName')&&$('#cName').focus(),50);
}

/* =========================================================================
   TASK ACTIONS (event delegation)
   ========================================================================= */
$('#view').addEventListener('click',async e=>{
  const btn=e.target.closest('[data-act]'); if(!btn) return;
  const id=btn.dataset.id, act=btn.dataset.act;
  const t=State.tasks.find(x=>x.id===id); if(!t&&act!=='edit') {}
  if(act==='edit'){ taskForm(State.tasks.find(x=>x.id===id)); return; }
  if(act==='del'){ if(confirm('Delete this task?')){ await Store.deleteTask(id); await refresh(); render(); toast('Task deleted'); } return; }
  if(act==='advance'){ t.status=btn.dataset.to; if(btn.dataset.to==='in_progress') t.handler=me().name; await Store.saveTask(t); await refresh(); render(); return; }
  if(act==='markdone'){
    const link=prompt('Paste a link to the completed work (Google Doc, sheet, audit…). Leave blank to skip:', t.resultLink||'');
    t.status='done'; t.doneAt=new Date().toISOString(); if(link!==null && link.trim()) t.resultLink=link.trim();
    await Store.saveTask(t); await refresh(); render(); toast('Marked done'); return;
  }
  if(act==='send'){ t.status='sent'; t.sentAt=new Date().toISOString(); t.clientOutcome='pending'; await Store.saveTask(t); await refresh(); render(); toast('Sent to client'); return; }
  if(act==='co'){ t.clientOutcome=btn.dataset.co; await Store.saveTask(t); await refresh(); render(); toast('Client status updated'); return; }
});

/* =========================================================================
   AUTH (team mode only) — email sign-up, new members become Manager
   ========================================================================= */
function mapUser(u){
  const m=u.user_metadata||{};
  return {id:u.id, email:u.email, name:m.name||(u.email||'').split('@')[0]||'Member', role:m.role||'Manager'};
}
function authMsg(text,kind){ const el=$('#authMsg'); el.textContent=text; el.className='auth-msg '+(kind||''); }
let authMode='signup';
function setAuthMode(mode){
  authMode=mode;
  $('#tabSignup').classList.toggle('active',mode==='signup');
  $('#tabLogin').classList.toggle('active',mode==='login');
  $('#nameField').style.display = mode==='signup'?'block':'none';
  $('#authGo').textContent = mode==='signup'?'Create account & join':'Log in';
  $('#authSub').textContent = mode==='signup'?'Your team workspace. Sign up with your work email to join.':'Welcome back — log in to your workspace.';
  authMsg('','');
}
async function doAuth(){
  const sb=Store.sb();
  const email=$('#authEmail').value.trim(), pass=$('#authPass').value;
  if(!email||!pass){ authMsg('Enter your email and password.','err'); return; }
  if(authMode==='signup'){
    const allowed=(CONFIG.ALLOWED_EMAIL_DOMAINS||[]).map(d=>d.toLowerCase());
    if(allowed.length){
      const dom=(email.split('@')[1]||'').toLowerCase();
      if(!allowed.includes(dom)){ authMsg('Sign-up is restricted to '+CONFIG.ALLOWED_EMAIL_DOMAINS.join(' or ')+' email addresses.','err'); return; }
    }
  }
  $('#authGo').disabled=true;
  try{
    if(authMode==='signup'){
      const name=$('#authName').value.trim()||email.split('@')[0];
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{name,role:'Manager'}}});
      if(error) throw error;
      if(data.session){ State.user=mapUser(data.session.user); await afterLogin(); }
      else { authMsg('Account created. Check your email to confirm, then log in.','ok'); setAuthMode('login'); }
    } else {
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
      State.user=mapUser(data.user); await afterLogin();
    }
  }catch(err){ authMsg(err.message||'Something went wrong.','err'); }
  finally{ $('#authGo').disabled=false; }
}
async function afterLogin(){
  try{ await Store.upsertMember({id:State.user.id,email:State.user.email,name:State.user.name,role:State.user.role}); }catch(e){}
  $('#authScreen').classList.remove('show');
  document.querySelector('.app').style.display='flex';
  await startApp();
}
async function doLogout(){
  try{ await Store.sb().auth.signOut(); }catch(e){}
  State.user=null;
  document.querySelector('.app').style.display='none';
  setAuthMode('login');
  $('#authScreen').classList.add('show');
}

/* =========================================================================
   BOOT
   ========================================================================= */
$('#nav').addEventListener('click',e=>{ const b=e.target.closest('[data-route]'); if(b) go(b.dataset.route); });
$('#newTaskBtn').onclick=()=>taskForm();
$('#menuBtn').onclick=()=>$('#sidebar').classList.toggle('open');
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

async function startApp(){
  try{ await refresh(); }
  catch(err){ console.error(err); toast('Could not reach the workspace database — check your Supabase setup.'); }
  render();
}

(async function boot(){
  ensureDefaults();
  if(TEAM){
    // wire auth screen
    $('#tabSignup').onclick=()=>setAuthMode('signup');
    $('#tabLogin').onclick=()=>setAuthMode('login');
    $('#authGo').onclick=doAuth;
    ['authEmail','authPass','authName'].forEach(id=>{ const el=$('#'+id); if(el) el.onkeydown=e=>{ if(e.key==='Enter') doAuth(); }; });
    setAuthMode('signup');
    const dn=(CONFIG.ALLOWED_EMAIL_DOMAINS||[]);
    if(dn.length){ const note=document.querySelector('.auth-note'); if(note) note.innerHTML='Only <b>@'+dn.join('</b> / <b>@')+'</b> emails can sign up. New members join as Manager.'; }
    document.querySelector('.app').style.display='none';
    let session=null;
    try{ const {data}=await Store.sb().auth.getSession(); session=data.session; }catch(e){}
    if(session){ State.user=mapUser(session.user); await afterLogin(); }
    else { $('#authScreen').classList.add('show'); }
  } else {
    await startApp();
  }
})();
</script>
</body>
