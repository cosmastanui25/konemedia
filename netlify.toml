[build]
  command = "node build.mjs"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Long-cache static assets (logos, js). A rebuild publishes fresh copies.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
